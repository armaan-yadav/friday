<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Friday — Voice Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #080810;
  --surface: #0e0e1a;
  --card: #131320;
  --border: rgba(255,255,255,0.06);
  --border-bright: rgba(255,255,255,0.12);
  --green: #00f5a0;
  --green-dim: rgba(0,245,160,0.12);
  --green-glow: rgba(0,245,160,0.25);
  --purple: #9b7fff;
  --purple-dim: rgba(155,127,255,0.1);
  --red: #ff4f6e;
  --red-dim: rgba(255,79,110,0.12);
  --amber: #ffc94a;
  --text: #e2e2f0;
  --text-2: #8888aa;
  --text-3: #44445a;
  --mono: 'Space Mono', monospace;
  --sans: 'Outfit', sans-serif;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100svh;
  display: flex;
  flex-direction: column;
  overflow-x: hidden;
}

/* ── Ambient background ────────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 60% 50% at 20% 10%, rgba(0,245,160,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 80%, rgba(155,127,255,0.05) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}

/* ── Header ────────────────────────────────────────────────────────── */
.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: rgba(8,8,16,0.85);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}

.logo {
  font-family: var(--mono);
  font-size: 0.95rem;
  letter-spacing: 0.04em;
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 10px var(--green);
  flex-shrink: 0;
  transition: all 0.3s;
}
.logo-dot.muted { background: var(--red); box-shadow: 0 0 10px var(--red); animation: none; }
.logo-dot.active { animation: pulse 2s ease-in-out infinite; }
.logo-dot.processing { background: var(--amber); box-shadow: 0 0 10px var(--amber); animation: blink 0.5s linear infinite; }
.logo-dot.thinking { background: var(--purple); box-shadow: 0 0 10px var(--purple); animation: blink 0.8s linear infinite; }

@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.75)} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

.logo-name { color: var(--text); }
.logo-name em { font-style: normal; color: var(--green); }

.header-center {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 8px;
}

.wake-badge {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border-bright);
  color: var(--text-2);
  background: var(--surface);
  transition: all 0.3s;
}
.wake-badge.active {
  border-color: rgba(0,245,160,0.3);
  color: var(--green);
  background: var(--green-dim);
}

.header-right { display: flex; align-items: center; gap: 10px; }

.model-tag {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 3px 8px;
  border: 1px solid var(--border);
  border-radius: 4px;
}

/* Mic toggle button */
.mic-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 7px 14px;
  border-radius: 6px;
  border: 1px solid rgba(0,245,160,0.3);
  background: var(--green-dim);
  color: var(--green);
  cursor: pointer;
  transition: all 0.2s;
  user-select: none;
}
.mic-btn:hover { background: rgba(0,245,160,0.2); border-color: rgba(0,245,160,0.5); }
.mic-btn.muted {
  border-color: rgba(255,79,110,0.3);
  background: var(--red-dim);
  color: var(--red);
}
.mic-btn.muted:hover { background: rgba(255,79,110,0.2); }
.mic-icon { font-size: 0.9rem; line-height: 1; }

/* ── Waveform strip ────────────────────────────────────────────────── */
.waveform-strip {
  position: fixed;
  top: 60px; left: 0; right: 0;
  z-index: 90;
  height: 36px;
  display: flex;
  align-items: center;
  gap: 1.5px;
  padding: 0 20px;
  background: rgba(8,8,16,0.7);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid var(--border);
  overflow: hidden;
}

.bar {
  flex: 1;
  min-width: 2px;
  background: var(--green);
  border-radius: 1px;
  height: 2px;
  opacity: 0.1;
  transition: height 0.04s, opacity 0.04s;
}

/* ── Main chat area ─────────────────────────────────────────────────── */
.chat-wrap {
  flex: 1;
  position: relative;
  z-index: 1;
  padding-top: 110px;
  padding-bottom: 90px;
  max-width: 760px;
  width: 100%;
  margin: 0 auto;
  padding-left: 20px;
  padding-right: 20px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

/* ── Empty state ──────────────────────────────────────────────────── */
.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  min-height: 50vh;
  gap: 20px;
  text-align: center;
}

.empty-orb {
  width: 100px; height: 100px;
  border-radius: 50%;
  background: radial-gradient(circle at 40% 35%, rgba(0,245,160,0.15), rgba(155,127,255,0.08) 60%, transparent 80%);
  border: 1px solid rgba(0,245,160,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  position: relative;
}
.empty-orb::after {
  content: '';
  position: absolute;
  inset: -12px;
  border-radius: 50%;
  border: 1px solid rgba(0,245,160,0.06);
}

.empty-title {
  font-size: 1rem;
  font-weight: 500;
  color: var(--text-2);
  letter-spacing: 0.02em;
}

.empty-hint {
  font-family: var(--mono);
  font-size: 0.65rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  display: flex;
  align-items: center;
  gap: 8px;
}
.empty-hint::before, .empty-hint::after {
  content: '';
  display: block;
  width: 30px;
  height: 1px;
  background: var(--border-bright);
}

/* ── Message groups ───────────────────────────────────────────────── */
.msg-group {
  padding: 28px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 16px;
  opacity: 0;
  transform: translateY(10px);
  animation: slidein 0.4s cubic-bezier(0.25,0.8,0.25,1) forwards;
}
.msg-group:last-of-type { border-bottom: none; }
@keyframes slidein { to { opacity:1; transform:translateY(0); } }

.msg-row {
  display: flex;
  gap: 14px;
  align-items: flex-start;
}

.avatar {
  width: 32px; height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--mono);
  font-size: 0.55rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  flex-shrink: 0;
  margin-top: 1px;
}
.avatar.you {
  background: var(--green-dim);
  border: 1px solid rgba(0,245,160,0.2);
  color: var(--green);
}
.avatar.ai {
  background: var(--purple-dim);
  border: 1px solid rgba(155,127,255,0.2);
  color: var(--purple);
}

.msg-content { flex: 1; min-width: 0; }

.msg-label {
  font-family: var(--mono);
  font-size: 0.58rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 6px;
}
.you .msg-label { color: rgba(0,245,160,0.5); }
.ai .msg-label { color: rgba(155,127,255,0.5); }

.msg-text {
  font-size: 0.97rem;
  line-height: 1.75;
  font-weight: 400;
}
.you .msg-text { color: #cceee5; }
.ai .msg-text { color: var(--text); }

.msg-meta {
  font-family: var(--mono);
  font-size: 0.58rem;
  color: var(--text-3);
  margin-top: 5px;
}

/* ── Live indicator rows ──────────────────────────────────────────── */
.live-row {
  display: none;
  gap: 12px;
  align-items: center;
  padding: 20px 0;
  font-family: var(--mono);
  font-size: 0.68rem;
  letter-spacing: 0.06em;
  color: var(--text-2);
}
.live-row.show { display: flex; }

/* Partial AI reply streaming display */
.partial-row {
  display: none;
  padding: 20px 0;
  gap: 14px;
  align-items: flex-start;
}
.partial-row.show { display: flex; }

.partial-text {
  font-size: 0.97rem;
  line-height: 1.75;
  color: var(--text);
  opacity: 0.7;
  flex: 1;
}

.partial-cursor {
  display: inline-block;
  width: 2px;
  height: 1em;
  background: var(--purple);
  margin-left: 2px;
  vertical-align: text-bottom;
  animation: cursor-blink 0.9s ease-in-out infinite;
}
@keyframes cursor-blink { 0%,45%{opacity:1} 55%,100%{opacity:0} }

/* Thinking dots */
.dots {
  display: flex;
  align-items: center;
  gap: 4px;
}
.dots span {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--purple);
  animation: dot-hop 1.2s ease-in-out infinite;
}
.dots span:nth-child(2) { animation-delay: 0.18s; }
.dots span:nth-child(3) { animation-delay: 0.36s; }
@keyframes dot-hop { 0%,80%,100%{transform:translateY(0);opacity:0.25} 40%{transform:translateY(-7px);opacity:1} }

/* Transcribing pulse */
.transcribing-ring {
  width: 14px; height: 14px;
  border-radius: 50%;
  border: 2px solid var(--amber);
  animation: ring-pulse 0.8s ease-in-out infinite;
}
@keyframes ring-pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:0.3} }

/* ── Bottom bar ───────────────────────────────────────────────────── */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 100;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  background: rgba(8,8,16,0.9);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
}

.count-chip {
  font-family: var(--mono);
  font-size: 0.62rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-3);
  display: flex;
  align-items: center;
  gap: 8px;
}
.count-num {
  color: var(--green);
  font-weight: 700;
}

.bar-btns { display: flex; gap: 8px; }

.bar-btn {
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-2);
  cursor: pointer;
  transition: all 0.18s;
}
.bar-btn:hover { border-color: var(--border-bright); color: var(--text); }
.bar-btn.red:hover { border-color: rgba(255,79,110,0.4); color: var(--red); }

/* ── Status text (center bottom bar) ─────────────────────────────── */
.status-label {
  position: absolute;
  left: 50%; transform: translateX(-50%);
  font-family: var(--mono);
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-3);
  transition: color 0.3s;
}
.status-label.active { color: var(--green); }
.status-label.processing { color: var(--amber); }
.status-label.thinking { color: var(--purple); }
.status-label.muted { color: var(--red); }

/* scrollbar */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────── -->
<header class="header">
  <div class="logo">
    <div class="logo-dot active" id="logo-dot"></div>
    <span class="logo-name">f<em>ri</em>day</span>
  </div>

  <div class="header-center">
    <div class="wake-badge" id="wake-badge">say · hey friday</div>
  </div>

  <div class="header-right">
    <div class="model-tag">gemma-4-e4b · local</div>
    <button class="mic-btn" id="mic-btn" onclick="toggleMute()">
      <span class="mic-icon" id="mic-icon">🎙</span>
      <span id="mic-label">mic on</span>
    </button>
  </div>
</header>

<!-- ── Waveform ─────────────────────────────────────────────────────── -->
<div class="waveform-strip" id="waveform"></div>

<!-- ── Chat ─────────────────────────────────────────────────────────── -->
<main class="chat-wrap" id="chat">
  <div class="empty" id="empty">
    <div class="empty-orb">🎙</div>
    <div class="empty-title">Waiting for you to speak</div>
    <div class="empty-hint">hey friday · wake word</div>
  </div>

  <!-- Live status rows — always at bottom of chat flow -->
  <div class="live-row" id="processing-row">
    <div class="transcribing-ring"></div>
    <span>transcribing speech…</span>
  </div>

  <div class="live-row" id="thinking-row">
    <div class="avatar ai">AI</div>
    <div class="dots"><span></span><span></span><span></span></div>
    <span style="margin-left:2px">friday is thinking…</span>
  </div>

  <!-- Streaming partial AI reply -->
  <div class="partial-row" id="partial-row">
    <div class="avatar ai">AI</div>
    <div class="msg-content">
      <div class="msg-label ai">friday · speaking</div>
      <div class="partial-text" id="partial-text"></div>
    </div>
  </div>
</main>

<!-- ── Bottom bar ────────────────────────────────────────────────────── -->
<footer class="bottom-bar">
  <div class="count-chip">
    <span class="count-num" id="count">0</span>
    <span>exchanges</span>
  </div>
  <div class="status-label active" id="status-label">listening</div>
  <div class="bar-btns">
    <button class="bar-btn" onclick="exportChat()">export</button>
    <button class="bar-btn red" onclick="clearChat()">clear</button>
  </div>
</footer>

<script>
// ── Waveform setup ─────────────────────────────────────────────────────
const waveformEl = document.getElementById('waveform');
const BAR_COUNT = 100;
for (let i = 0; i < BAR_COUNT; i++) {
  const b = document.createElement('div');
  b.className = 'bar';
  waveformEl.appendChild(b);
}
const bars = Array.from(waveformEl.querySelectorAll('.bar'));

async function startMicViz() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    const ctx = new AudioContext();
    const src = ctx.createMediaStreamSource(stream);
    const analyser = ctx.createAnalyser();
    analyser.fftSize = 256;
    src.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    const draw = () => {
      requestAnimationFrame(draw);
      analyser.getByteFrequencyData(data);
      bars.forEach((bar, i) => {
        const bin = Math.floor(i / BAR_COUNT * data.length);
        const v = data[bin];
        bar.style.height = (2 + (v / 255) * 28) + 'px';
        bar.style.opacity = 0.08 + (v / 255) * 0.85;
        const green = isMuted ? 60 : Math.floor(245 - (v / 255) * 80);
        bar.style.background = isMuted
          ? `rgba(255,79,110,${0.3 + (v/255)*0.4})`
          : `rgb(0,${green},160)`;
      });
    };
    draw();
  } catch {
    let t = 0;
    const idle = () => {
      requestAnimationFrame(idle);
      t += 0.025;
      bars.forEach((bar, i) => {
        const h = 2 + Math.abs(Math.sin(t + i * 0.18)) * 7;
        bar.style.height = h + 'px';
        bar.style.opacity = 0.05 + Math.abs(Math.sin(t + i * 0.14)) * 0.05;
        bar.style.background = 'var(--green)';
      });
    };
    idle();
  }
}

// ── State ──────────────────────────────────────────────────────────────
let knownCount = 0;
let localEntries = [];
let isMuted = false;
let lastState = '';

const logoDot = document.getElementById('logo-dot');
const wakeBadge = document.getElementById('wake-badge');
const micBtn = document.getElementById('mic-btn');
const micIcon = document.getElementById('mic-icon');
const micLabel = document.getElementById('mic-label');
const statusLabel = document.getElementById('status-label');
const processingRow = document.getElementById('processing-row');
const thinkingRow = document.getElementById('thinking-row');
const partialRow = document.getElementById('partial-row');
const partialText = document.getElementById('partial-text');
const chatEl = document.getElementById('chat');
const countEl = document.getElementById('count');

// ── Mic toggle ─────────────────────────────────────────────────────────
async function toggleMute() {
  try {
    const res = await fetch('/toggle-mute', { method: 'POST' });
    const data = await res.json();
    applyMuteState(data.muted);
  } catch (err) {
    console.error('Toggle mute failed', err);
  }
}

async function initMuteState() {
  try {
    const res = await fetch('/mute-status');
    const data = await res.json();
    applyMuteState(data.muted);
  } catch (err) {
    console.error('Failed to fetch mute status', err);
  }
}

function applyMuteState(muted) {
  isMuted = muted;
  micBtn.classList.toggle('muted', muted);
  micIcon.textContent = muted ? '🔇' : '🎙';
  micLabel.textContent = muted ? 'mic off' : 'mic on';
  logoDot.classList.toggle('muted', muted);
  if (muted) {
    wakeBadge.classList.remove('active');
    setStatus('muted');
  } else {
    setStatus('active');
  }
}

// ── Status ─────────────────────────────────────────────────────────────
function setStatus(state) {
  lastState = state;
  logoDot.className = 'logo-dot ' + (isMuted ? 'muted' : state === 'active' ? 'active' : state === 'processing' ? 'processing' : state === 'thinking' ? 'thinking' : 'active');

  const labels = {
    active: 'listening',
    processing: 'transcribing',
    thinking: 'thinking',
    muted: 'muted',
    offline: 'offline',
  };
  statusLabel.textContent = labels[state] || state;
  statusLabel.className = 'status-label ' + state;
}

// ── Add completed exchange ─────────────────────────────────────────────
function addEntry(entry) {
  const empty = document.getElementById('empty');
  if (empty) empty.remove();

  // Hide partial display
  partialRow.classList.remove('show');
  partialText.textContent = '';

  const group = document.createElement('div');
  group.className = 'msg-group';
  group.innerHTML = `
    <div class="msg-row you">
      <div class="avatar you">YOU</div>
      <div class="msg-content">
        <div class="msg-label">voice · translated</div>
        <div class="msg-text">${escapeHtml(entry.user)}</div>
        <div class="msg-meta">${entry.time}</div>
      </div>
    </div>
    <div class="msg-row ai">
      <div class="avatar ai">AI</div>
      <div class="msg-content">
        <div class="msg-label">friday</div>
        <div class="msg-text">${escapeHtml(entry.ai)}</div>
      </div>
    </div>
  `;
  chatEl.insertBefore(group, processingRow);
  countEl.textContent = chatEl.querySelectorAll('.msg-group').length;
  scrollToBottom();
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(str));
  return d.innerHTML;
}

function scrollToBottom() {
  window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
}

// ── Polling ────────────────────────────────────────────────────────────
async function poll() {
  try {
    const res = await fetch('/transcripts.json?t=' + Date.now());
    if (!res.ok) throw new Error('fetch failed');
    const data = await res.json();

    // Mute state from server
    applyMuteState(!!data.muted);

    // Status dots
    const isProcessing = !!data.processing;
    const isThinking = !!data.thinking;
    const partial = data.partial_ai || '';

    processingRow.classList.toggle('show', isProcessing);
    thinkingRow.classList.toggle('show', isThinking && !partial);

    // Streaming partial response
    if (partial && (data.transcripts || []).length === knownCount) {
      // New partial content — show it
      partialRow.classList.add('show');
      partialText.innerHTML = escapeHtml(partial) + '<span class="partial-cursor"></span>';
      thinkingRow.classList.remove('show');
      scrollToBottom();
    } else if (!isThinking && !partial) {
      partialRow.classList.remove('show');
    }

    // Wake badge — light up when active
    if (!isMuted) {
      wakeBadge.classList.toggle('active', !isProcessing && !isThinking && !partial);
    }

    if (isProcessing && !isMuted) setStatus('processing');
    else if ((isThinking || partial) && !isMuted) setStatus('thinking');
    else if (!isMuted) setStatus('active');

    if (isProcessing || isThinking || partial) scrollToBottom();

    const entries = data.transcripts || [];
    if (entries.length > knownCount) {
      for (let i = knownCount; i < entries.length; i++) addEntry(entries[i]);
      knownCount = entries.length;
      localEntries = entries;
    }

  } catch {
    if (lastState !== 'offline') setStatus('offline');
  }
  setTimeout(poll, 250);
}

// ── Export / Clear ─────────────────────────────────────────────────────
function exportChat() {
  const txt = localEntries.map(e =>
    `[${e.time}]\nYou: ${e.user}\nFriday: ${e.ai}`
  ).join('\n\n---\n\n');
  if (!txt) return;
  const blob = new Blob([txt], { type: 'text/plain' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `friday-chat-${Date.now()}.txt`;
  a.click();
}

function clearChat() {
  chatEl.querySelectorAll('.msg-group').forEach(e => e.remove());
  partialRow.classList.remove('show');
  knownCount = 0;
  localEntries = [];
  countEl.textContent = '0';
  if (!document.getElementById('empty')) {
    const div = document.createElement('div');
    div.className = 'empty';
    div.id = 'empty';
    div.innerHTML = `
      <div class="empty-orb">🎙</div>
      <div class="empty-title">Waiting for you to speak</div>
      <div class="empty-hint">hey friday · wake word</div>
    `;
    chatEl.insertBefore(div, processingRow);
  }
}

// ── Boot ───────────────────────────────────────────────────────────────
(async () => {
  await initMuteState();
  setStatus('active');
  startMicViz();
  poll();
})();
</script>
</body>
</html>
